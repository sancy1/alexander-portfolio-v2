events {
    worker_connections 1024;
}

http {
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;

    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        # 🧠 Rules Applied: Wide timeout buffers to absorb Render cold boot lag windows
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        resolver 8.8.8.8 valid=30s;

        set $auth_backend "https://${AUTH_SERVICE_HOST}";

        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"API Gateway"}';
            add_header Content-Type application/json;
        }

        location ~ ^/api/v1/health {
            proxy_pass $auth_backend$request_uri;
            proxy_set_header Host "${AUTH_SERVICE_HOST}";
            proxy_set_header X-Gateway-Secret "${GATEWAY_SECRET}";
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 🏗️ Rules Applied: Upstream Fault Isolation Retry Matrix
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 90s;
        }

        location ~ ^/api/v1/(admins/register|admins/login|admins/forgot-password|admins/reset-password|auth/google|auth/github) {
            proxy_pass $auth_backend$request_uri;
            proxy_set_header Host "${AUTH_SERVICE_HOST}";
            proxy_set_header X-Gateway-Secret "${GATEWAY_SECRET}";
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 🏗️ Rules Applied: Upstream Fault Isolation Retry Matrix
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 90s;
        }

        location /api/v1/ {
            proxy_pass $auth_backend$request_uri;
            proxy_set_header Host "${AUTH_SERVICE_HOST}";
            proxy_set_header X-Gateway-Secret "${GATEWAY_SECRET}";
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_set_header Authorization $http_authorization;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 🏗️ Rules Applied: Upstream Fault Isolation Retry Matrix
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 90s;
        }

        # FIXED: Regex matching catches all documentation asset paths seamlessly
        location ~ ^/(swagger|swagger-ui) {
            proxy_pass $auth_backend;
            proxy_set_header Host "${AUTH_SERVICE_HOST}";
            proxy_set_header X-Gateway-Secret "${GATEWAY_SECRET}";
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 🏗️ Rules Applied: Upstream Fault Isolation Retry Matrix
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 90s;
        }

        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
