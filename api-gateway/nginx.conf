events {
    worker_connections 1024;
}

http {
    # Auth service URL from environment variable
    upstream auth_service {
        server ${AUTH_SERVICE_URL};
    }

    # Enable CORS for all origins
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;

    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;

        # Handle preflight OPTIONS requests
        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }
        }

        # Health check (public)
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"API Gateway"}';
            add_header Content-Type application/json;
        }

        # Public health endpoints (no auth required)
        location ~ ^/api/v1/health {
            proxy_pass http://auth_service$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public auth endpoints (registration, login, password reset)
        location ~ ^/api/v1/(admins/register|admins/login|admins/reset-password|auth/google|auth/github) {
            proxy_pass http://auth_service$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Protected endpoints (require JWT - React will send Authorization header)
        location /api/v1/ {
            proxy_pass http://auth_service$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Pass the Authorization header to auth service
            proxy_set_header Authorization $http_authorization;
        }

        # Swagger UI (public for development, can restrict later)
        location /swagger {
            proxy_pass http://auth_service/swagger;
            proxy_set_header Host $host;
        }

        # Default
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}