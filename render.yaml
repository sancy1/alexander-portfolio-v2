services:
  # API Gateway - PUBLIC facing (stays as web service)
  - type: web
    name: api-gateway
    runtime: docker              # ← Changed from "image" to "docker"
    repo: https://github.com/sancy1/alexander-portfolio-v2
    branch: main
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    envVars:
      - key: AUTH_SERVICE_HOST
        fromService:
          name: auth-service
          type: pserv
          property: host
      - key: AUTH_SERVICE_PORT
        fromService:
          name: auth-service
          type: pserv
          property: port

  # Auth Service - PRIVATE (not directly accessible from internet)
  - type: pserv
    name: auth-service
    runtime: docker              # ← Changed from "image" to "docker"
    repo: https://github.com/sancy1/alexander-portfolio-v2
    branch: main
    dockerfilePath: ./services/auth-service/Dockerfile
    dockerContext: ./services/auth-service
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: auth-service
      - key: JWT_AUDIENCE
        value: portfolio-api
      - key: JWT_EXPIRY_MINUTES
        value: 360
      - key: ADMIN_MASTER_KEY
        sync: false
      - key: ADMIN_KEY_REQUIRE_FOR_REGISTRATION
        value: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false