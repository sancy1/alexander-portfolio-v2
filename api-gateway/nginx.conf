events {
    worker_connections 1024;
}

http {
    # Auth service URL will be injected via environment variable
    upstream auth_service {
        server ${AUTH_SERVICE_URL};
    }

    upstream blog_service {
        server blog-service:3000;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    upstream core_info_service {
        server core-info-service:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"API Gateway"}';
            add_header Content-Type application/json;
        }

        # Auth Service Routes
        location /api/v1/auth/ {
            proxy_pass http://auth_service/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/admins/ {
            proxy_pass http://auth_service/api/v1/admins/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/health {
            proxy_pass http://auth_service/api/v1/health;
            proxy_set_header Host $host;
        }

        location /swagger {
            proxy_pass http://auth_service/swagger;
            proxy_set_header Host $host;
        }

        # Blog Service (future)
        location /api/v1/blog/ {
            proxy_pass http://blog_service/api/v1/blog/;
            proxy_set_header Host $host;
        }

        # AI Service (future)
        location /api/v1/ai/ {
            proxy_pass http://ai_service/api/v1/ai/;
            proxy_set_header Host $host;
        }

        # Core Service (future)
        location /api/v1/core/ {
            proxy_pass http://core_info_service/api/v1/core/;
            proxy_set_header Host $host;
        }

        # Default
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}