name: Deploy Auth Service

on:
  push:
    paths:
      - 'services/auth-service/**'
      - '.github/workflows/deploy-auth-service.yml'
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/auth-service

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth_changed: ${{ steps.changes.outputs.auth-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            auth-service:
              - 'services/auth-service/**'
      
      - name: Show what changed
        run: |
          echo "Auth Service changed: ${{ steps.changes.outputs.auth-service }}"

  build-and-deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth_changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Setup Node.js (for Nx)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Auth Service
        run: |
          cd services/auth-service
          dotnet restore AuthService.sln
          dotnet build AuthService.sln --configuration Release --no-restore
      
      - name: Test Auth Service
        run: |
          cd services/auth-service
          dotnet test AuthService.sln --configuration Release --no-build
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker Image
        run: |
          cd services/auth-service
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -f Dockerfile .
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: Push Docker Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      
      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }} \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"imageUrl":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"}'